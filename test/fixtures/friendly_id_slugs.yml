# Fixture slugs bypass FriendlyId callbacks; seed history so rename/redirect tests work.

setup_one:
  slug: one
  sluggable_type: Setup
  sluggable_id: <%= ActiveRecord::FixtureSet.identify(:one) %>
  scope: user_id:<%= ActiveRecord::FixtureSet.identify(:one) %>

